<html>
  <head>
    <title>PlantOS</title>
  </head>
  <body>
    <h1>PlantOS</h1>

    <h2>Zone 1</h2>
    <button id="open">Manual Open Water</button>
    <button id="close">Manual Close Water</button>

    <script>
      const open = document.querySelector("#open");
      const close = document.querySelector("#close");

      open.addEventListener("click", () => {
        fetch("/open");
      });

      close.addEventListener("click" () => {
        fetch("/close");
      });
    </script>
  </body>
</html>
